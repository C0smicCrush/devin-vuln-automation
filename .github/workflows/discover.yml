name: Ingest Security Findings

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1-5"

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TARGET_REPO_OWNER: C0smicCrush
      TARGET_REPO_NAME: superset-remediation
    steps:
      - name: Check out automation repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare upstream findings
        run: python scripts/scan_or_import_findings.py

      - name: Create GitHub work items
        run: python scripts/create_issues.py

      - name: Render workflow summary
        run: |
          echo "## Finding ingestion run" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          payload = json.loads(Path("state/issues.json").read_text())
          print(f"- Findings processed: `{payload['count']}`")
          print(f"- Work items created this run: `{payload['created_count']}`")
          for item in payload["issues"]:
              print(f"- Issue #{item['issue_number']}: {item['issue_title']}")
          PY

      - name: Upload discovery artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discovery-state
          path: |
            state/findings.json
            state/issues.json
