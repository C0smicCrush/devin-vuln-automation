name: Observe Devin Sessions

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  observe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
      DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
      TARGET_REPO_OWNER: C0smicCrush
      TARGET_REPO_NAME: superset-remediation
    steps:
      - name: Check out automation repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll Devin sessions
        run: python scripts/poll_devin_sessions.py

      - name: Render metrics markdown
        run: python scripts/render_metrics.py

      - name: Append GitHub summary
        run: cat metrics/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload observability artifacts
        uses: actions/upload-artifact@v4
        with:
          name: observability-report
          path: |
            metrics/latest.json
            metrics/summary.md
            state/sessions.json
