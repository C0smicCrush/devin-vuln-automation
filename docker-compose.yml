services:
  intake:
    build:
      context: .
    image: devin-vuln-automation:local
    working_dir: /app
    environment:
      RUNTIME_BACKEND: ${RUNTIME_BACKEND:-local}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      GH_TOKEN: ${GH_TOKEN:-}
      DEVIN_API_KEY: ${DEVIN_API_KEY:-}
      DEVIN_ORG_ID: ${DEVIN_ORG_ID:-}
      TARGET_REPO_OWNER: ${TARGET_REPO_OWNER:-C0smicCrush}
      TARGET_REPO_NAME: ${TARGET_REPO_NAME:-superset-remediation}
      DEVIN_BYPASS_APPROVAL: ${DEVIN_BYPASS_APPROVAL:-false}
      DEVIN_VERIFICATION_BYPASS_APPROVAL: ${DEVIN_VERIFICATION_BYPASS_APPROVAL:-false}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      LINEAR_WEBHOOK_SECRET: ${LINEAR_WEBHOOK_SECRET:-}
      LOCAL_STATE_DIR: /app/state
      LOCAL_METRICS_DIR: /app/metrics
      LOCAL_INTAKE_PORT: 8000
    ports:
      - "${LOCAL_INTAKE_PORT:-8000}:8000"
    volumes:
      - local_state:/app/state
      - local_metrics:/app/metrics
    command: python scripts/local_intake_server.py

  worker:
    image: devin-vuln-automation:local
    working_dir: /app
    depends_on:
      - intake
    environment:
      RUNTIME_BACKEND: ${RUNTIME_BACKEND:-local}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      GH_TOKEN: ${GH_TOKEN:-}
      DEVIN_API_KEY: ${DEVIN_API_KEY:-}
      DEVIN_ORG_ID: ${DEVIN_ORG_ID:-}
      TARGET_REPO_OWNER: ${TARGET_REPO_OWNER:-C0smicCrush}
      TARGET_REPO_NAME: ${TARGET_REPO_NAME:-superset-remediation}
      DEVIN_BYPASS_APPROVAL: ${DEVIN_BYPASS_APPROVAL:-false}
      DEVIN_VERIFICATION_BYPASS_APPROVAL: ${DEVIN_VERIFICATION_BYPASS_APPROVAL:-false}
      MAX_ACTIVE_REMEDIATIONS: ${MAX_ACTIVE_REMEDIATIONS:-2}
      LOCAL_STATE_DIR: /app/state
      LOCAL_METRICS_DIR: /app/metrics
      LOCAL_WORKER_POLL_INTERVAL_SECONDS: ${LOCAL_WORKER_POLL_INTERVAL_SECONDS:-2}
    volumes:
      - local_state:/app/state
      - local_metrics:/app/metrics
    command: python scripts/local_worker.py

  poller:
    image: devin-vuln-automation:local
    working_dir: /app
    depends_on:
      - worker
    environment:
      RUNTIME_BACKEND: ${RUNTIME_BACKEND:-local}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      GH_TOKEN: ${GH_TOKEN:-}
      DEVIN_API_KEY: ${DEVIN_API_KEY:-}
      DEVIN_ORG_ID: ${DEVIN_ORG_ID:-}
      TARGET_REPO_OWNER: ${TARGET_REPO_OWNER:-C0smicCrush}
      TARGET_REPO_NAME: ${TARGET_REPO_NAME:-superset-remediation}
      DEVIN_BYPASS_APPROVAL: ${DEVIN_BYPASS_APPROVAL:-false}
      DEVIN_VERIFICATION_BYPASS_APPROVAL: ${DEVIN_VERIFICATION_BYPASS_APPROVAL:-false}
      LOCAL_STATE_DIR: /app/state
      LOCAL_METRICS_DIR: /app/metrics
      LOCAL_POLLER_INTERVAL_SECONDS: ${LOCAL_POLLER_INTERVAL_SECONDS:-30}
    volumes:
      - local_state:/app/state
      - local_metrics:/app/metrics
    command: python scripts/local_poller.py

  dashboard:
    image: devin-vuln-automation:local
    working_dir: /app
    depends_on:
      - poller
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      GH_TOKEN: ${GH_TOKEN:-}
      DEVIN_API_KEY: ${DEVIN_API_KEY:-}
      DEVIN_ORG_ID: ${DEVIN_ORG_ID:-}
      TARGET_REPO_OWNER: ${TARGET_REPO_OWNER:-C0smicCrush}
      TARGET_REPO_NAME: ${TARGET_REPO_NAME:-superset-remediation}
      LOCAL_STATE_DIR: /app/state
      LOCAL_METRICS_DIR: /app/metrics
      LOCAL_DASHBOARD_PORT: 8001
    ports:
      - "${LOCAL_DASHBOARD_PORT:-8001}:8001"
    volumes:
      - local_state:/app/state:ro
      - local_metrics:/app/metrics:ro
    command: python scripts/dashboard_server.py

  test:
    image: devin-vuln-automation:local
    working_dir: /app
    profiles: ["test"]
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      GH_TOKEN: ${GH_TOKEN:-}
      DEVIN_API_KEY: ${DEVIN_API_KEY:-}
      DEVIN_ORG_ID: ${DEVIN_ORG_ID:-}
      TARGET_REPO_OWNER: ${TARGET_REPO_OWNER:-C0smicCrush}
      TARGET_REPO_NAME: ${TARGET_REPO_NAME:-superset-remediation}
    command: python -m unittest discover -s tests -p test_*.py

volumes:
  local_state:
  local_metrics:
